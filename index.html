<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{margin:0;display:flex;height:100vh;background:#1e1e1e;font-family:sans-serif}

.panel{width:300px;background:#2b2b2b;padding:10px;color:#fff}
.btn{width:100%;padding:8px;margin:4px 0;background:#444;border:none;color:#fff;border-radius:6px}

.palette{display:flex;gap:6px;margin:6px 0}
.color{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid #555}

.canvasBox{flex:1;display:flex;align-items:center;justify-content:center}
canvas{background:#fff} /* 显示白底 */
</style>
</head>

<body>

<div class="panel">
<h3>罗盘工具</h3>

<button class="btn" onclick="addLayer()">添加层</button>

<div id="layersUI"></div>

<button class="btn" onclick="exportPNG()">导出透明PNG</button>

</div>

<div class="canvasBox">
<canvas id="c"></canvas>
</div>

<script>
const c=document.getElementById("c")
const x=c.getContext("2d")
c.width=900
c.height=900

const palette=["#000","#c0392b","#2980b9","#27ae60","#f39c12","#8e44ad"]

let scale=1

let state={
layers:[
{n:8,data:"乾,兑,离,震,巽,坎,艮,坤",size:18,color:"#000",w:60},
{n:24,data:"子,癸,丑,艮,寅,甲,卯,乙,辰,巽,巳,丙,午,丁,未,坤,申,庚,酉,辛,戌,乾,亥,壬",size:12,color:"#000",w:50}
]
}

// UI
function buildUI(){
let box=document.getElementById("layersUI")
box.innerHTML=""

state.layers.forEach((l,i)=>{
let colors=palette.map(col=>
`<div class="color" style="background:${col}" onclick="state.layers[${i}].color='${col}'"></div>`
).join("")

box.innerHTML+=`
<div style="background:#333;padding:6px;margin:6px 0;border-radius:6px">
第${i+1}层
分割 <input value="${l.n}" onchange="state.layers[${i}].n=this.value">
厚度 <input value="${l.w}" onchange="state.layers[${i}].w=this.value">
<div class="palette">${colors}</div>
</div>
`
})
}
buildUI()

function addLayer(){
state.layers.push({n:12,data:"",size:12,color:"#000",w:50})
buildUI()
}

// 缩放
c.onwheel=e=>{
e.preventDefault()
scale *= e.deltaY<0 ? 1.1 : 0.9
}

// 👉 核心绘制函数（可复用）
function drawCompass(ctx, transparent=false){

if(!transparent){
ctx.fillStyle="#fff"
ctx.fillRect(0,0,900,900)
}

ctx.save()
ctx.translate(450,450)
ctx.scale(scale,scale)
ctx.translate(-450,-450)

let inner=80

state.layers.forEach(l=>{
let outer=inner+l.w
let arr=l.data.split(",")
let step=Math.PI*2/l.n

ctx.strokeStyle="rgba(0,0,0,0.6)"
ctx.fillStyle=l.color
ctx.font=l.size+"px serif"

for(let i=0;i<l.n;i++){
let a=i*step-Math.PI/2

ctx.beginPath()
ctx.moveTo(450+Math.cos(a)*inner,450+Math.sin(a)*inner)
ctx.lineTo(450+Math.cos(a)*outer,450+Math.sin(a)*outer)
ctx.stroke()

let mid=(inner+outer)/2
let tx=450+Math.cos(a+step/2)*mid
let ty=450+Math.sin(a+step/2)*mid

let angle=a+step/2
if(angle>Math.PI/2 && angle<Math.PI*1.5){
angle+=Math.PI
}

ctx.save()
ctx.translate(tx,ty)
ctx.rotate(angle+Math.PI/2)
ctx.textAlign="center"
ctx.textBaseline="middle"
ctx.fillText(arr[i]||"",0,0)
ctx.restore()
}

ctx.beginPath()
ctx.arc(450,450,outer,0,Math.PI*2)
ctx.stroke()

inner=outer
})

ctx.restore()
}

// 主绘制
function draw(){
requestAnimationFrame(draw)
x.clearRect(0,0,900,900)
drawCompass(x,false) // 显示用（白底）
}
draw()

// 👉 真透明导出（关键修复）
function exportPNG(){
let temp=document.createElement("canvas")
temp.width=900
temp.height=900
let tx=temp.getContext("2d")

drawCompass(tx,true) // 不画白底

let a=document.createElement("a")
a.href=temp.toDataURL("image/png")
a.download="罗盘.png"
a.click()
}
</script>

</body>
</html>
